<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ayosh</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}


body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:25px;

    background:
    linear-gradient(135deg,#ff9ed3,#ff4fa3,#9b5cff);

    overflow:hidden;

}


body::before{

    content:"";

    position:absolute;

    width:350px;
    height:350px;

    background:#ffffff55;

    border-radius:50%;

    top:-120px;
    right:-100px;

    filter:blur(30px);

}



body::after{

    content:"";

    position:absolute;

    width:300px;
    height:300px;

    background:#ffb8dc;

    border-radius:50%;

    bottom:-100px;
    left:-100px;

    filter:blur(40px);

}



.profile{

    position:relative;

    width:100%;
    max-width:460px;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.5);

    border-radius:40px;

    padding:35px;

    box-shadow:
    0 30px 80px rgba(0,0,0,.25);

}



.header{

    text-align:center;

    color:white;

    margin-bottom:25px;

}


.header h1{

    font-size:38px;

    font-weight:900;

    text-shadow:
    0 5px 20px #c90065;

}


.header p{

    margin-top:5px;

    opacity:.9;

}



.avatar{

    width:120px;

    height:120px;

    margin:0 auto 20px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:60px;

    background:

    linear-gradient(135deg,#ff69b4,#ffd0e8);

    border:6px solid white;

    box-shadow:

    0 15px 35px #ff3f98aa;

}



.card{

    background:white;

    border-radius:35px;

    padding:28px;

}



.username{

    text-align:center;

    color:#ff248b;

    font-size:24px;

    font-weight:900;

    margin-bottom:25px;

}



.info{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:17px;

    margin-bottom:14px;

    border-radius:22px;

    background:#fff2f8;

    transition:.3s;

}


.info:hover{

    transform:translateY(-4px);

    background:#ffe1ef;

}



.title{

    color:#ff238a;

    font-weight:900;

}



.value{

    color:#444;

    font-weight:600;

}



.about{

    margin-top:20px;

    padding:22px;

    border-radius:25px;

    text-align:center;

    background:

    linear-gradient(135deg,#fff1f8,#ffffff);

    color:#555;

    line-height:2;

    font-size:18px;

}



.tag{

    display:inline-block;

    margin-top:15px;

    padding:8px 20px;

    border-radius:50px;

    background:#ff2d92;

    color:white;

    font-weight:bold;

}



.footer{

    text-align:center;

    color:white;

    margin-top:20px;

    opacity:.8;

}


</style>

</head>


<body>


<div class="profile">


<div class="header">

<h1>آية</h1>

<p>Personal Profile ✨</p>

</div>



<div class="avatar">
🌸
</div>



<div class="card">


<div class="username">
@ayosh
</div>



<div class="info">
<span class="title">الاسم</span>
<span class="value">آية</span>
</div>


<div class="info">
<span class="title">المواليد</span>
<span class="value">2008</span>
</div>



<div class="info">
<span class="title">العمر</span>
<span class="value">18 سنة</span>
</div>



<div class="info">
<span class="title">الصفة</span>
<span class="value">كيوت ولطيفة 💗</span>
</div>



<div class="about">

آية شخصية كيوت وهادئة 🌸
<br>
تحب الأشياء الجميلة والبسيطة،
ولها أسلوب لطيف ومميز ✨

<br>

<span class="tag">
Cute Girl 💕
</span>

</div>


</div>



<div class="footer">
Ayosh Profile
</div>


</div>


</body>
</html>
