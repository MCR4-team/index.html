<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MCR4 • SKY BLUE KEY SYSTEM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8f4fd 0%, #d0eaff 30%, #b8dffb 60%, #cce7ff 100%);
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 1.5rem;
    }

    /* دوائر زخرفية في الخلفية */
    body::before {
      content: "";
      position: fixed;
      top: -150px;
      right: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(100, 180, 255, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -120px;
      left: -120px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(70, 160, 255, 0.25) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 500px;
      max-width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 36px;
      padding: 2.8rem 2.2rem;
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow: 
        0 25px 60px rgba(30, 100, 180, 0.2),
        0 10px 30px rgba(0, 120, 210, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      text-align: center;
      position: relative;
      z-index: 10;
      animation: softFloat 0.9s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes softFloat {
      from {
        opacity: 0;
        transform: translateY(35px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* شعار MCR4 أزرق سماوي */
    .logo {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: 7px;
      background: linear-gradient(180deg, #4da8ff 0%, #1e7ed4 50%, #0b5ca8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 8px rgba(0, 120, 220, 0.3));
      line-height: 1;
      margin-bottom: 0.2rem;
      font-family: 'Poppins', 'Impact', sans-serif;
      font-style: italic;
    }

    .line-blue {
      width: 70px;
      height: 5px;
      background: linear-gradient(90deg, transparent, #5ba4f0, #2980d8, #5ba4f0, transparent);
      margin: 0.4rem auto 1.2rem;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(30, 130, 230, 0.5);
    }

    .subtitle {
      color: #1e6cb8;
      font-weight: 600;
      letter-spacing: 5px;
      font-size: 0.9rem;
      text-transform: uppercase;
      margin-bottom: 2rem;
      background: rgba(30, 130, 220, 0.08);
      padding: 0.5rem 2rem;
      border-radius: 30px;
      display: inline-block;
      border: 1px solid rgba(70, 150, 230, 0.4);
    }

    .key-panel {
      background: #ffffff;
      border: 2px solid #c0ddfa;
      border-radius: 24px;
      padding: 1.6rem 1.2rem;
      margin: 1.2rem 0 1.5rem;
      box-shadow: 
        0 10px 30px rgba(30, 120, 210, 0.12),
        inset 0 0 30px rgba(180, 210, 250, 0.3);
    }

    .key-display {
      font-size: 1.7rem;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      background: #f5faff;
      color: #0b5eb0;
      padding: 1.2rem 0.5rem;
      border-radius: 16px;
      letter-spacing: 2px;
      word-break: break-all;
      border: 1px solid #b8d7f8;
      box-shadow: inset 0 0 20px rgba(70, 150, 230, 0.15);
      text-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .timer-box {
      margin-top: 1rem;
      color: #2c78c9;
      font-weight: 600;
      font-size: 1rem;
      background: #f0f7ff;
      padding: 0.5rem 1.5rem;
      border-radius: 25px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #c4dffa;
      letter-spacing: 0.5px;
    }

    #countdown {
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, #3490e8, #1a6fc4);
      padding: 0.25rem 1rem;
      border-radius: 20px;
      margin-left: 5px;
      box-shadow: 0 3px 10px rgba(30, 120, 220, 0.3);
    }

    /* قسم صاحب الموقع */
    .owner-section {
      margin: 1.8rem 0 1rem;
      padding: 0.9rem 2.2rem;
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid #cbe4ff;
      border-radius: 35px;
      display: inline-block;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0, 120, 210, 0.1);
    }

    .owner-label {
      color: #4a8bc9;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .owner-name {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(180deg, #3d93e8, #1359a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 6px rgba(20, 100, 200, 0.25));
      letter-spacing: 1px;
    }

    /* أزرار محسنة بتصميم جميل */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin: 2rem 0 1rem;
    }

    button {
      border: none;
      padding: 1rem 2.2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }

    /* زر النسخ */
    .copy-btn {
      background: linear-gradient(135deg, #ffffff, #eaf4ff);
      color: #1a6fc4;
      border: 2px solid #a0ceff;
      box-shadow: 
        0 6px 20px rgba(30, 130, 230, 0.25),
        0 2px 6px rgba(0,0,0,0.05);
      font-weight: 700;
    }

    .copy-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(70, 160, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .copy-btn:hover::before {
      left: 100%;
    }

    .copy-btn:hover {
      background: #e4f0ff;
      border-color: #5aa5f0;
      box-shadow: 0 10px 28px rgba(30, 130, 230, 0.4), 0 4px 10px rgba(0,0,0,0.08);
      transform: translateY(-5px);
      color: #0b5ca8;
    }

    /* زر الديسكورد */
    .discord-btn {
      background: linear-gradient(135deg, #ffffff, #eef6ff);
      color: #5865F2;
      border: 2px solid #b8c9ff;
      box-shadow: 
        0 6px 20px rgba(88, 101, 242, 0.2),
        0 2px 6px rgba(0,0,0,0.05);
      font-weight: 700;
    }

    .discord-btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(130, 150, 255, 0.15), transparent);
      transition: left 0.5s ease;
    }

    .discord-btn:hover::after {
      left: 100%;
    }

    .discord-btn:hover {
      background: #f0f4ff;
      border-color: #7b8aff;
      box-shadow: 0 10px 28px rgba(88, 101, 242, 0.35), 0 4px 10px rgba(0,0,0,0.08);
      transform: translateY(-5px);
      color: #404eed;
    }

    button:active {
      transform: translateY(0px) scale(0.97);
      transition: 0.1s;
    }

    /* أيقونات داخل الأزرار */
    .btn-icon {
      font-size: 1.2rem;
      transition: transform 0.3s ease;
    }

    button:hover .btn-icon {
      transform: scale(1.2) rotate(-5deg);
    }

    .footer {
      color: #7aa9d4;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 3px;
      border-top: 1px dashed #b8d4f0;
      padding-top: 1.2rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- شعار MCR4 أزرق سماوي -->
    <div class="logo">MCR4</div>
    <div class="line-blue"></div>
    <div class="subtitle">❄️ SKY BLUE KEY SYSTEM ❄️</div>

    <!-- لوحة المفتاح 28 حرف -->
    <div class="key-panel">
      <div class="key-display" id="keyDisplay">جاري التحميل...</div>
      <div class="timer-box">
        ⏳ ينتهي خلال <span id="countdown">24:00:00</span>
      </div>
    </div>

    <!-- صاحب الموقع Roblox -->
    <div class="owner-section">
      <div class="owner-label">🔷 ROBLOX OWNER 🔷</div>
      <div class="owner-name">zaman544</div>
    </div>

    <!-- أزرار محسنة -->
    <div class="buttons">
      <button class="copy-btn" id="copyBtn">
        <span class="btn-icon">📋</span> نسخ المفتاح
      </button>
      <button class="discord-btn" id="discordBtn">
        <span class="btn-icon">💬</span> Discord
      </button>
    </div>

    <div class="footer">© MCR4 SKY BLUE SYSTEM • 28-KEY</div>
  </div>

  <script>
    (function() {
      const KEY_LENGTH = 28;
      const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      const STORAGE_KEY = "mcr4_skyblue_data";
      const HOURS_24 = 24 * 60 * 60 * 1000;

      function hashString(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          hash = ((hash << 5) - hash) + str.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function mulberry32(a) {
        return function() {
          a |= 0;
          a = a + 0x6D2B79F5 | 0;
          let t = Math.imul(a ^ a >>> 15, 1 | a);
          t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
      }

      function generateKey(ip) {
        const ipHash = hashString(ip);
        let key = '';
        for (let i = 0; i < KEY_LENGTH; i++) {
          const seed = (ipHash + i * 211) ^ (ipHash >> (i % 11));
          const rng = mulberry32(seed);
          key += CHARS[Math.floor(rng() * CHARS.length)];
        }
        return key;
      }

      async function fetchIP() {
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          if (res.ok) {
            const data = await res.json();
            return data.ip;
          }
        } catch(e) {}
        return 'fallback-' + hashString(navigator.userAgent + screen.width + Date.now());
      }

      function loadData() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY));
        } catch(e) {
          return null;
        }
      }

      function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      async function init() {
        const keyEl = document.getElementById('keyDisplay');
        const countdownEl = document.getElementById('countdown');

        keyEl.textContent = '⏳ جاري التحميل...';

        const userIP = await fetchIP();
        const now = Date.now();
        let stored = loadData();
        let key, expire;

        if (stored && stored.ip === userIP && stored.key && stored.expire && now < stored.expire) {
          key = stored.key;
          expire = stored.expire;
        } else {
          key = generateKey(userIP);
          expire = now + HOURS_24;
        }

        saveData({ ip: userIP, key: key, expire: expire });
        keyEl.textContent = key;

        function updateCountdown() {
          const remaining = expire - Date.now();
          if (remaining <= 0) {
            const newKey = generateKey(userIP);
            const newExpire = Date.now() + HOURS_24;
            saveData({ ip: userIP, key: newKey, expire: newExpire });
            keyEl.textContent = newKey;
            expire = newExpire;
            updateCountdown();
            return;
          }
          const h = Math.floor(remaining / (1000 * 60 * 60));
          const m = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
          const s = Math.floor((remaining % (1000 * 60)) / 1000);
          countdownEl.textContent = 
            String(h).padStart(2, '0') + ':' +
            String(m).padStart(2, '0') + ':' +
            String(s).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        document.getElementById('copyBtn').addEventListener('click', () => {
          const txt = keyEl.textContent;
          if (!txt || txt.includes('جاري')) return;
          navigator.clipboard.writeText(txt).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '<span class="btn-icon">✅</span> تم النسخ!';
            setTimeout(() => {
              btn.innerHTML = '<span class="btn-icon">📋</span> نسخ المفتاح';
            }, 2000);
          });
        });

        document.getElementById('discordBtn').addEventListener('click', () => {
          window.open('https://discord.gg/crXn2fdMJe', '_blank');
        });
      }

      init().catch(() => {
        document.getElementById('keyDisplay').textContent = 'خطأ في التحميل';
      });
    })();
  </script>
</body>
</html>
